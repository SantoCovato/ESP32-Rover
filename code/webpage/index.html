<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>ESP32 Rover Controller - Modern Minimal</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin:0; padding:0; font-family: 'Poppins', sans-serif; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { display: flex; background: #000; color: #fff; }

  #left, #center, #right {
    padding: 1%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #left { width: 25%; background: #111; justify-content: flex-start; }
  #center { width: 50%; background: #111; justify-content: center; }
  #right { width: 25%; background: #111; justify-content: center; }

  #left label {
    font-size: 2vw;
    font-weight: 600;
    margin-bottom: 10px;
    text-align: center;
  }

  button, label { font-size: 1vw; font-weight: 400; }

  #joystick-container {
    flex-grow: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
  }

  #joystick-base {
    width: 70%;
    aspect-ratio: 1 / 1; 
    border-radius: 50%;
    background: #222;
    position: relative;
    max-width: 280px;
  }

  #joystick-stick {
    width: 35%;
    aspect-ratio: 1 / 1;
    border-radius: 50%;
    background: #555;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    touch-action: none;
    cursor: pointer;
  }

  #camera {
    width: 90%;
    aspect-ratio: 4 / 3; 
    max-width: 480px;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0 auto;
    color: #fff;
    font-weight: 500;
    border: 2px solid #444;
    border-radius: 10px;
    margin-bottom: 1%;
  }

  #buttons {
    display: flex;
    gap: 5%;
    margin-top: 0.5%;
  }

  button {
    padding: 0.5% 1%;
    border-radius: 6px;
    border: none;
    background: #333;
    color: #fff;
    cursor: pointer;
    font-weight: 400;
    transition: background 0.2s, border 0.2s;
  }

  button:hover { background: #555; }

  .slidecontainer {
    height: 90%; 
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slider {
    -webkit-appearance: none;
    width: 200px;
    height: 30px;
    background: #333;
    border-radius: 15px;
    outline: none;
  }

  .slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #555;
    cursor: pointer;
  }

  .slider::-moz-range-thumb {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #555;
    cursor: pointer;
  }

  input[type=range] { transform: rotate(270deg); }

  .popup { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:none; justify-content:center; align-items:center; z-index:1000; }
  .popup-content { background:#111; padding:20px; border-radius:10px; text-align:center; width:80%; max-width:300px; color:#fff; display:flex; flex-direction:column; gap:15px;}
  .close-btn { padding:5px 10px; font-size:0.9rem; background:#222; border:none; border-radius:6px; cursor:pointer; margin-top:10px;}
  .close-btn:hover { background:#444; }

  .settings-option { padding:8px 12px; border-radius:6px; background:#333; cursor:pointer; border: 2px solid transparent;}
  .settings-option:hover { background:#555; }

</style>
</head>
<body>

<div id="left">
  <label>ESP32 ROVER</label>
  <button id="settings-btn">Settings</button>
  <div id="joystick-container">
    <div id="joystick-base">
      <div id="joystick-stick"></div>
    </div>
  </div>
</div>

<div id="center">
  <div id="camera">Camera FPV</div>
  <div id="buttons">
    <button id="take-picture">Take Picture</button>
    <button id="record-video">Record Video</button>
  </div>
</div>

<div id="right">
  <label>Camera Vertical Tilt</label>
  <div class="slidecontainer">
    <input type="range" min="1" max="100" value="50" class="slider" id="myRange">
  </div>
</div>

<div id="save-popup" class="popup">
  <div class="popup-content">
    <p id="save-message"></p>
    <button id="close-save-popup" class="close-btn">Chiudi</button>
  </div>
</div>

<div id="settings-popup" class="popup">
  <div class="popup-content">
    <p>Seleziona destinazione salvataggio:</p>
    <div class="settings-option" id="save-device">Dispositivo</div>
    <div class="settings-option" id="save-microsd">MicroSD</div>
    <button id="close-settings-popup" class="close-btn">Chiudi</button>
  </div>
</div>

<script>
let saveLocation = "Dispositivo";
let recording = false;

// Imposta bordo verde di default
const saveDeviceBtn = document.getElementById("save-device");
const saveMicroSDBtn = document.getElementById("save-microsd");
saveDeviceBtn.style.border = "2px solid #0f0";

const settingsBtn = document.getElementById("settings-btn");
const settingsPopup = document.getElementById("settings-popup");
settingsBtn.addEventListener("click", () => { settingsPopup.style.display = "flex"; });

function selectSaveLocation(location){
  saveLocation = location;
  settingsPopup.style.display = "none";
  if(location==="Dispositivo"){
    saveDeviceBtn.style.border = "2px solid #0f0";
    saveMicroSDBtn.style.border = "2px solid transparent";
  } else {
    saveDeviceBtn.style.border = "2px solid transparent";
    saveMicroSDBtn.style.border = "2px solid #0f0";
  }
}

saveDeviceBtn.addEventListener("click", ()=>selectSaveLocation("Dispositivo"));
saveMicroSDBtn.addEventListener("click", ()=>selectSaveLocation("MicroSD"));

document.getElementById("close-settings-popup").addEventListener("click", ()=>settingsPopup.style.display="none");

const takePictureBtn = document.getElementById("take-picture");
takePictureBtn.addEventListener("click", () => {
  takePictureBtn.style.border = "3px solid red";
  setTimeout(() => {
    takePictureBtn.style.border = "none";
    document.getElementById("save-message").textContent = `Foto salvata su: ${saveLocation}`;
    document.getElementById("save-popup").style.display = "flex";
  }, 1000);
});

const recordVideoBtn = document.getElementById("record-video");
recordVideoBtn.addEventListener("click", () => {
  if (!recording){
    recording = true;
    recordVideoBtn.style.border = "3px solid red";
  } else {
    recording = false;
    recordVideoBtn.style.border = "none";
    document.getElementById("save-message").textContent = `Video salvato su: ${saveLocation}`;
    document.getElementById("save-popup").style.display = "flex";
  }
});

document.getElementById("close-save-popup").addEventListener("click", () => {
  document.getElementById("save-popup").style.display = "none";
});

const slider = document.getElementById("myRange");
slider.oninput = () => console.log("Slider:", slider.value);
</script>

</body>
</html>
